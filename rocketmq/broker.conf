brokerClusterName=DefaultCluster
brokerName=broker-a
brokerId=0
namesrvAddr=rocketmq-namesrv:9876
autoCreateTopicEnable=true

# 64 queues per topic — supports up to 64 matching-engine consumer instances.
# MessageGroup (symbol) hashes into these queues; multiple symbols share a queue.
defaultTopicQueueNums=64

# Each auto-created topic gets 1024 queues so symbol-hash routing has
# enough buckets for a full stock market (A-share ~5000, US ~10000 symbols)
defaultTopicQueueNums=1024

# Sync flush: wait until data is flushed to disk before ack
flushDiskType=SYNC_FLUSH

# Sync replication: wait for slave ack before returning (safe even with single broker)
brokerRole=SYNC_MASTER
