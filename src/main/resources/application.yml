spring:

  server:
    port: 8080

  datasource:
    url: jdbc:postgresql://localhost:5432/mydatabase
    username: myuser
    password: secret
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: redis
      port: 6379

rocketmq:
  name-server: localhost:9876
  producer:
    group: order-producer-group
    send-message-timeout: 3000

# Matching engine consumer queue assignment.
# Each instance is assigned a fixed range of queues so symbol-to-engine routing
# never changes due to rebalance.  Override per instance via environment variables:
#   MATCHING_CONSUMER_QUEUE_START=0  MATCHING_CONSUMER_QUEUE_END=15
matching:
  consumer:
    queue-start: 0
    queue-end: 63
